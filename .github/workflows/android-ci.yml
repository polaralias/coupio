name: Android Debug CI

on:
  push:
    branches:
      - main
      - "feat/**"
      - "fix/**"
      - "docs/**"
      - "chore/**"
      - "refactor/**"
      - "test/**"
  pull_request:

permissions:
  contents: read

jobs:
  build-debug-apk:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: "17"
          distribution: "temurin"
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install required Android SDK packages
        shell: bash
        run: |
          set -euo pipefail
          yes | sdkmanager --licenses >/dev/null || true
          sdkmanager "platform-tools" "platforms;android-36"

      - name: Extract version metadata
        id: version
        shell: bash
        run: |
          python - <<'PY'
          import json
          import pathlib
          import re

          text = pathlib.Path("app/build.gradle.kts").read_text(encoding="utf-8")
          version_name = re.search(r'versionName\s*=\s*"([^"]+)"', text).group(1)
          version_code = re.search(r'versionCode\s*=\s*(\d+)', text).group(1)
          pathlib.Path("version-metadata.json").write_text(
              json.dumps(
                  {
                      "applicationId": "com.polaralias.coupio",
                      "artifact": "coupio-debug.apk",
                      "versionName": version_name,
                      "versionCode": int(version_code),
                  },
                  indent=2,
              )
              + "\n",
              encoding="utf-8",
          )
          PY
          python - <<'PY' >> "$GITHUB_OUTPUT"
          import json
          data = json.load(open("version-metadata.json", encoding="utf-8"))
          print(f"version_name={data['versionName']}")
          print(f"version_code={data['versionCode']}")
          PY

      - name: Remove local.properties
        run: rm -f local.properties

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Run verification baseline and build debug APK
        run: ./gradlew --no-daemon --console=plain testDebugUnitTest lintDebug assembleDebug

      - name: Rename debug APK
        run: mv app/build/outputs/apk/debug/app-debug.apk app/build/outputs/apk/debug/coupio-debug.apk

      - name: Upload debug APK
        uses: actions/upload-artifact@v6
        with:
          name: coupio-debug
          path: app/build/outputs/apk/debug/coupio-debug.apk
          if-no-files-found: error

      - name: Upload version metadata
        uses: actions/upload-artifact@v6
        with:
          name: coupio-version-metadata
          path: version-metadata.json
          if-no-files-found: error
